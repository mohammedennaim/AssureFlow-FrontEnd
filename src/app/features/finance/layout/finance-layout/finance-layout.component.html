<div class="layout-wrapper d-flex w-100 h-100 bg-light">
    <!-- Sidebar -->
    <aside class="sidebar bg-dark text-white d-flex flex-column transition-all"
        [class.collapsed]="isSidebarCollapsed">
        <!-- Brand -->
        <div class="sidebar-brand d-flex align-items-center justify-content-center py-4 border-bottom border-secondary">
            <i class="fa-solid fa-shield-halved fs-3 text-warning me-2"></i>
            <span class="fs-4 fw-bold text-uppercase brand-text" *ngIf="!isSidebarCollapsed">Assure<span
                    class="text-warning">Flow</span></span>
        </div>

        <!-- Navigation -->
        <ul class="nav nav-pills flex-column mb-auto mt-3 px-2">
            <li class="nav-item mb-1">
                <a routerLink="/finance/dashboard" routerLinkActive="active"
                    class="nav-link text-white d-flex align-items-center rounded-3 px-3 py-2 transition-colors">
                    <i class="fa-solid fa-gauge-high fs-5 text-center sidebar-icon"></i>
                    <span class="ms-3 nav-text" *ngIf="!isSidebarCollapsed">Dashboard</span>
                </a>
            </li>

            <li class="nav-item mb-1 mt-3">
                <small class="text-uppercase text-muted fw-bold px-3 nav-text" *ngIf="!isSidebarCollapsed"
                    style="font-size: 0.7rem; letter-spacing: 1px;">Finance</small>
            </li>

            <li class="nav-item mb-1">
                <a routerLink="/finance/invoices" routerLinkActive="active"
                    class="nav-link text-white d-flex align-items-center rounded-3 px-3 py-2 transition-colors">
                    <i class="fa-solid fa-file-invoice-dollar fs-5 text-center sidebar-icon"></i>
                    <span class="ms-3 nav-text" *ngIf="!isSidebarCollapsed">Invoices</span>
                </a>
            </li>

            <li class="nav-item mb-1">
                <a routerLink="/finance/billing" routerLinkActive="active"
                    class="nav-link text-white d-flex align-items-center rounded-3 px-3 py-2 transition-colors">
                    <i class="fa-solid fa-money-bill-wave fs-5 text-center sidebar-icon"></i>
                    <span class="ms-3 nav-text" *ngIf="!isSidebarCollapsed">Billing</span>
                </a>
            </li>

            <li class="nav-item mb-1">
                <a routerLink="/finance/reports" routerLinkActive="active"
                    class="nav-link text-white d-flex align-items-center rounded-3 px-3 py-2 transition-colors">
                    <i class="fa-solid fa-chart-line fs-5 text-center sidebar-icon"></i>
                    <span class="ms-3 nav-text" *ngIf="!isSidebarCollapsed">Reports</span>
                </a>
            </li>

            <li class="nav-item mb-1 mt-3">
                <small class="text-uppercase text-muted fw-bold px-3 nav-text" *ngIf="!isSidebarCollapsed"
                    style="font-size: 0.7rem; letter-spacing: 1px;">Other</small>
            </li>

            <li class="nav-item mb-1">
                <a routerLink="/finance/notifications" routerLinkActive="active"
                    class="nav-link text-white d-flex align-items-center rounded-3 px-3 py-2 transition-colors">
                    <i class="fa-solid fa-bell fs-5 text-center sidebar-icon"></i>
                    <span class="ms-3 nav-text" *ngIf="!isSidebarCollapsed">Notifications</span>
                </a>
            </li>
        </ul>

        <!-- Logout -->
        <div class="mt-auto px-2 py-3 border-top border-secondary">
            <a class="nav-link text-danger d-flex align-items-center rounded-3 px-3 py-2 transition-colors"
                role="button" tabindex="0">
                <i class="fa-solid fa-right-from-bracket fs-5 text-center sidebar-icon"></i>
                <span class="ms-3 nav-text fw-semibold" *ngIf="!isSidebarCollapsed">Logout</span>
            </a>
        </div>
    </aside>

    <!-- Main Content -->
    <div class="main-content d-flex flex-column flex-grow-1 overflow-hidden transition-all">
        <!-- Topbar -->
        <header class="topbar bg-white shadow-sm d-flex justify-content-between align-items-center px-4 py-3 border-bottom z-1">
            <button class="btn btn-light rounded-circle shadow-sm border-0 d-flex align-items-center justify-content-center p-2"
                (click)="toggleSidebar()" style="width: 40px; height: 40px;">
                <i class="fa-solid fa-bars text-secondary fs-5"></i>
            </button>
            <div class="d-flex align-items-center gap-3">
                <span class="badge bg-warning text-dark px-3 py-2 rounded-pill">Finance</span>
            </div>
        </header>

        <!-- Page Content -->
        <main class="page-content flex-grow-1 overflow-auto p-4">
            <router-outlet></router-outlet>
        </main>
    </div>
</div>
