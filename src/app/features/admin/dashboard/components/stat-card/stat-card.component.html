<div
    class="stat-card p-4 rounded-4 shadow-sm h-100 bg-white d-flex align-items-center position-relative overflow-hidden">
    <div class="stat-card-icon rounded-circle d-flex align-items-center justify-content-center me-3"
        [ngClass]="colorClass">
        <i [class]="iconClass"></i>
    </div>

    <div class="stat-card-content flex-grow-1">
        <h6 class="text-muted mb-1 fw-bold text-uppercase" style="font-size: 0.75rem; letter-spacing: 0.5px;">{{ title
            }}</h6>

        <div *ngIf="loading" class="spinner-border spinner-border-sm text-primary" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>

        <h3 *ngIf="!loading" class="mb-0 fw-bolder">{{ value }}</h3>
    </div>

    <div class="stat-card-bg-icon position-absolute opacity-10" [ngClass]="colorClass">
        <i [class]="iconClass"></i>
    </div>
</div>
