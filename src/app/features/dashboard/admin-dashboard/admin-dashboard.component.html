<div class="container-fluid py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="h3 mb-0 text-gray-800 fw-bold">Admin Dashboard</h2>
        <button class="btn btn-primary shadow-sm" (click)="loadStats()" [disabled]="loading">
            <i class="fa-solid fa-rotate-right me-2" [class.fa-spin]="loading"></i> Refresh
        </button>
    </div>

    <div *ngIf="error" class="alert alert-danger shadow-sm border-0 rounded-3 mb-4" role="alert">
        <i class="fa-solid fa-circle-exclamation me-2"></i> {{ error }}
    </div>

    <div class="row g-4 mb-4">
        <!-- Users Stat Card -->
        <div class="col-xl-4 col-md-6 mb-4">
            <app-stat-card title="Total Users" [value]="stats?.totalUsers || 0" iconClass="fa-solid fa-users"
                colorClass="text-primary" [loading]="loading">
            </app-stat-card>
        </div>

        <!-- Clients Stat Card -->
        <div class="col-xl-4 col-md-6 mb-4">
            <app-stat-card title="Total Clients" [value]="stats?.totalClients || 0"
                iconClass="fa-solid fa-building-user" colorClass="text-success" [loading]="loading">
            </app-stat-card>
        </div>

        <!-- Policies Stat Card -->
        <div class="col-xl-4 col-md-6 mb-4">
            <app-stat-card title="Active Policies" [value]="stats?.totalPolicies || 0"
                iconClass="fa-solid fa-file-shield" colorClass="text-info" [loading]="loading">
            </app-stat-card>
        </div>

        <!-- Claims Stat Card -->
        <div class="col-xl-4 col-md-6 mb-4">
            <app-stat-card title="Reported Claims" [value]="stats?.totalClaims || 0"
                iconClass="fa-solid fa-file-medical" colorClass="text-warning" [loading]="loading">
            </app-stat-card>
        </div>

        <!-- Invoices Stat Card -->
        <div class="col-xl-4 col-md-6 mb-4">
            <app-stat-card title="Invoices" [value]="stats?.totalInvoices || 0"
                iconClass="fa-solid fa-file-invoice-dollar" colorClass="text-danger" [loading]="loading">
            </app-stat-card>
        </div>

        <!-- Workflows Stat Card -->
        <div class="col-xl-4 col-md-6 mb-4">
            <app-stat-card title="Active Workflows" [value]="stats?.totalWorkflows || 0"
                iconClass="fa-solid fa-diagram-project" colorClass="text-secondary" [loading]="loading">
            </app-stat-card>
        </div>
    </div>
</div>
